<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aromahpure | Exclusive</title>
    <style>
        :root { --primary: #2c3e50; --accent: #78a22f; }
        body { 
            font-family: sans-serif; margin: 0; 
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('bg.jpg');
            background-size: cover; background-attachment: fixed;
        }
        header { text-align: center; padding: 20px; background: #fff; }
        .logo { width: 150px; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; padding: 15px; position: sticky; top: 0; background: #fff; z-index: 100; border-bottom: 1px solid #eee; }
        .tab-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: #fff; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        .product-card { background: #fff; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); overflow: hidden; text-align: center; }
        .img-container { height: 300px; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .info { padding: 20px; }
        .buy-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .buy-btn { text-decoration: none; padding: 12px; border-radius: 10px; color: #fff; font-weight: bold; font-size: 0.8rem; }
        .amazon { background: #232f3e; }
        .flipkart { background: #2874f0; }
    </style>
</head>
<body>
    <header><img src="logo.png" class="logo" alt="Aromahpure"></header>
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="filter('all', this)">All</button>
        <button class="tab-btn" onclick="filter('wave', this)">Wave</button>
        <button class="tab-btn" onclick="filter('wink', this)">Wink</button>
        <button class="tab-btn" onclick="filter('reed', this)">Reed</button>
    </div>
    <div class="container" id="list">
        <div class="product-card" data-cat="wave">
            <div class="img-container"><img src="wave.jpg" class="product-img"></div>
            <div class="info">
                <h3>Gel Wave</h3><p>₹349</p>
                <div class="buy-buttons">
                    <a href="https://www.amazon.in/dp/B0DTJ1W6PN" class="buy-btn amazon">AMAZON</a>
                    <a href="https://www.flipkart.com/p/itm19b2a42c5b6f1" class="buy-btn flipkart">FLIPKART</a>
                </div>
            </div>
        </div>
        <div class="product-card" data-cat="wink">
            <div class="img-container"><img src="wink.jpg" class="product-img"></div>
            <div class="info">
                <h3>Gel Wink</h3><p>₹299</p>
                <div class="buy-buttons">
                    <a href="https://www.amazon.in/dp/B0FLF1H8S4" class="buy-btn amazon">AMAZON</a>
                    <a href="https://www.flipkart.com/p/itm295d6eda7a2d4" class="buy-btn flipkart">FLIPKART</a>
                </div>
            </div>
        </div>
        <div class="product-card" data-cat="reed">
            <div class="img-container"><img src="reed.jpg" class="product-img"></div>
            <div class="info">
                <h3>Reed Diffuser</h3><p>₹799</p>
                <div class="buy-buttons">
                    <a href="https://www.amazon.in/dp/B0DJD36FQN" class="buy-btn amazon">AMAZON</a>
                    <a href="https://www.flipkart.com/p/itmd77e65585908e" class="buy-btn flipkart">FLIPKART</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        function filter(c, b) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            document.querySelectorAll('.product-card').forEach(card => {
                card.style.display = (c === 'all' || card.dataset.cat === c) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
