<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aromahpure | Premium Senses</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #78a22f; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: #f4f4f4; background-image: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('bg.jpg'); background-size: cover; background-attachment: fixed; }
        header { text-align: center; padding: 25px; background: #fff; border-bottom: 1px solid #eee; }
        .logo { width: 160px; }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; padding: 12px; position: sticky; top: 0; background: rgba(255,255,255,0.95); z-index: 100; border-bottom: 1px solid #f0f0f0; }
        .tab-btn { padding: 8px 18px; border: 1px solid #ddd; border-radius: 25px; background: #fff; cursor: pointer; font-size: 0.75rem; }
        .tab-btn.active { background: var(--primary); color: white; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        .product-card { background: #fff; border-radius: 25px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); text-align: center; }
        .img-container { height: 320px; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-info { padding: 20px; }
        .buy-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .buy-btn { text-decoration: none; padding: 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; color: white; }
        .amazon { background: #232f3e; }
        .flipkart { background: #2874f0; }
    </style>
</head>
<body>

    <header><img src="logo.png" class="logo"></header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="filter('all', this)">All</button>
        <button class="tab-btn" onclick="filter('wave', this)">Gel Wave</button>
        <button class="tab-btn" onclick="filter('wink', this)">Gel Wink</button>
        <button class="tab-btn" onclick="filter('reed', this)">Diffusers</button>
    </div>

    <div class="container" id="product-list">
        <div class="product-card" data-cat="wave">
            <div class="img-container"><img src="wave.jpg" class="product-img"></div>
            <div class="product-info">
                <h3>Gel Wave Pocket</h3>
                <div class="buy-buttons">
                    <a href="https://www.amazon.in/dp/B0DTJ1W6PN" class="buy-btn amazon" onclick="logClick('Gel Wave', 'Amazon')">AMAZON</a>
                    <a href="https://www.flipkart.com/p/itm19b2a42c5b6f1" class="buy-btn flipkart" onclick="logClick('Gel Wave', 'Flipkart')">FLIPKART</a>
                </div>
            </div>
        </div>

        <div class="product-card" data-cat="wink">
            <div class="img-container"><img src="wink.jpg" class="product-img"></div>
            <div class="product-info">
                <h3>Gel Wink Series</h3>
                <div class="buy-buttons">
                    <a href="https://www.amazon.in/dp/B0FLF1H8S4" class="buy-btn amazon" onclick="logClick('Gel Wink', 'Amazon')">AMAZON</a>
                    <a href="https://www.flipkart.com/p/itm295d6eda7a2d4" class="buy-btn flipkart" onclick="logClick('Gel Wink', 'Flipkart')">FLIPKART</a>
                </div>
            </div>
        </div>

        <div class="product-card" data-cat="reed">
            <div class="img-container"><img src="reed.jpg" class="product-img"></div>
            <div class="product-info">
                <h3>Reed Diffuser Set</h3>
                <div class="buy-buttons">
                    <a href="https://www.amazon.in/dp/B0DJD36FQN" class="buy-btn amazon" onclick="logClick('Reed Diffuser', 'Amazon')">AMAZON</a>
                    <a href="https://www.flipkart.com/p/itmd77e65585908e" class="buy-btn flipkart" onclick="logClick('Reed Diffuser', 'Flipkart')">FLIPKART</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbztpPImi_kY57qxEdEjk-pGxbJIArDYf9DFHGLuHe738e_rGZrE-6nWJcpDJnHF-64G/exec"; // <--- APNA URL YAHAN DALO

        let sessionData = {
            uniqueId: 'ID-' + Math.random().toString(36).substr(2, 9),
            device: /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop",
            visitTime: new Date().toLocaleString(),
            amazonClicks: [],
            flipkartClicks: [],
            maxScroll: 0,
            location: "Detecting...",
            ip: "0.0.0.0",
            userAgent: navigator.userAgent
        };

        // Get Location
        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            sessionData.location = data.city + ", " + data.region;
            sessionData.ip = data.ip;
        }).catch(() => { sessionData.location = "Unknown"; });

        function logClick(product, platform) {
            if (platform === 'Amazon') sessionData.amazonClicks.push(product);
            if (platform === 'Flipkart') sessionData.flipkartClicks.push(product);
            sendData(); // Live update on click
        }

        window.onscroll = function() {
            let currentScroll = window.pageYOffset || document.documentElement.scrollTop;
            let scrollMeters = (currentScroll / 3800).toFixed(2);
            if (parseFloat(scrollMeters) > parseFloat(sessionData.maxScroll)) sessionData.maxScroll = scrollMeters;
        };

        function sendData() {
            sessionData.leaveTime = new Date().toLocaleString();
            const start = new Date(sessionData.visitTime).getTime();
            sessionData.timeSpent = Math.round((new Date().getTime() - start) / 1000) + "s";

            if (navigator.sendBeacon) {
                navigator.sendBeacon(SCRIPT_URL, JSON.stringify(sessionData));
            } else {
                fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(sessionData), mode: 'no-cors' });
            }
        }

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') sendData();
        });

        function filter(c, b) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            document.querySelectorAll('.product-card').forEach(card => {
                card.style.display = (c === 'all' || card.dataset.cat === c) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
