<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aromahpure | Premium Senses</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #78a22f; --bg: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f4f4f4;
            color: #333;
            overflow-x: hidden;
            /* Premium gradient background if image fails */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-attachment: fixed;
        }
        
        header { text-align: center; padding: 25px; background: #fff; border-bottom: 1px solid #eee; }
        /* Logo placeholder if image fails */
        .logo { width: 180px; height: auto; display: block; margin: 0 auto; min-height: 50px; }

        .nav-tabs { display: flex; justify-content: center; gap: 8px; padding: 12px; position: sticky; top: 0; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #f0f0f0; }
        .tab-btn { padding: 8px 18px; border: 1px solid #ddd; border-radius: 25px; background: #fff; cursor: pointer; font-size: 0.75rem; font-weight: 500; transition: 0.3s; color: #666; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .container { padding: 20px; max-width: 450px; margin: auto; }
        .product-card { background: rgba(255,255,255,1); border-radius: 25px; overflow: hidden; margin-bottom: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #fff; }
        
        .img-container { width: 100%; height: 380px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .product-info { padding: 25px; text-align: center; }
        .brand-tag { font-size: 0.65rem; color: var(--accent); font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; display: block; }
        .product-title { font-size: 1.5rem; margin-bottom: 5px; color: var(--primary); font-family: 'Playfair Display', serif; }
        .price { font-size: 1.25rem; font-weight: 600; margin-bottom: 25px; color: #444; }

        .buy-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .buy-btn { text-decoration: none; text-align: center; padding: 16px; border-radius: 15px; font-size: 0.85rem; font-weight: 600; color: white; transition: 0.3s; }
        .amazon { background: #232f3e; }
        .flipkart { background: #2874f0; }
        .buy-btn:active { transform: scale(0.96); }

        footer { text-align: center; padding: 50px 20px; font-size: 0.7rem; color: #888; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <img src="https://aromahpure.com/cdn/shop/files/Aromahpure_Logo_1_200x.png" 
             onerror="this.src='https://placehold.co/200x80?text=AROMAHPURE'" alt="Aromahpure" class="logo">
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="filter('all', this)">All</button>
        <button class="tab-btn" onclick="filter('gel-wave', this)">Gel Wave</button>
        <button class="tab-btn" onclick="filter('gel-wink', this)">Gel Wink</button>
        <button class="tab-btn" onclick="filter('diffuser', this)">Diffusers</button>
    </div>

    <div class="container" id="product-list">
        <div class="product-card" data-cat="gel-wave">
            <div class="img-container">
                <img src="https://m.media-amazon.com/images/I/71Y0v2n2vVL._SL1500_.jpg" class="product-img" alt="Gel Wave">
            </div>
            <div class="product-info">
                <span class="brand-tag">BATHROOM FRESHNESS</span>
                <h2 class="product-title">Gel Wave Pocket</h2>
                <p class="price">₹349</p>
                <div class="buy-buttons">
                    <a href="https://www.amazon.in/Aromahpure-Long-Lasting-Freshener-Accessories-Lavender-Musk-Ocean/dp/B0DTJ1W6PN" class="buy-btn amazon" target="_blank">AMAZON</a>
                    <a href="https://www.flipkart.com/aromahpure-gel-wave-bathroom-freshener-assorted-set-5-gel-based-hanging-pocket-blocks-gel-wave/p/itm19b2a42c5b6f1" class="buy-btn flipkart" target="_blank">FLIPKART</a>
                </div>
            </div>
        </div>

        <div class="product-card" data-cat="gel-wink">
            <div class="img-container">
                <img src="https://m.media-amazon.com/images/I/61kM597N6BL._SL1500_.jpg" class="product-img" alt="Gel Wink">
            </div>
            <div class="product-info">
                <span class="brand-tag">CAR PREMIUM</span>
                <h2 class="product-title">Gel Wink Series</h2>
                <p class="price">₹299</p>
                <div class="buy-buttons">
                    <a href="https://www.amazon.in/Aromahpure-Bathroom-Freshener-Gel-Based-freshener/dp/B0FLF1H8S4" class="buy-btn amazon" target="_blank">AMAZON</a>
                    <a href="https://www.flipkart.com/aromahpure-gel-wink-hanging-car-perfume-lemon-sandal-berry-long-lasting-easy-use-air-freshener-diffuser-gel-wink-3/p/itm295d6eda7a2d4" class="buy-btn flipkart" target="_blank">FLIPKART</a>
                </div>
            </div>
        </div>

        <div class="product-card" data-cat="diffuser">
            <div class="img-container">
                <img src="https://m.media-amazon.com/images/I/71Y894G71KL._SL1500_.jpg" class="product-img" alt="Reed Diffuser">
            </div>
            <div class="product-info">
                <span class="brand-tag">HOME THERAPY</span>
                <h2 class="product-title">French Lavender Reed</h2>
                <p class="price">₹799</p>
                <div class="buy-buttons">
                    <a href="https://www.amazon.in/Aromahpure-Diffuser-Lavender-Freshener-Aromatherapy/dp/B0DJD36FQN" class="buy-btn amazon" target="_blank">AMAZON</a>
                    <a href="https://www.flipkart.com/aromahpure-lavender-diffuser-set-4-fiber-reed-sticks-room-air-freshener-home-long-lasting/p/itmd77e65585908e" class="buy-btn flipkart" target="_blank">FLIPKART</a>
                </div>
            </div>
        </div>
    </div>

    <footer>AROMAHPURE LUXURY &copy; 2026</footer>

    <script>
        function filter(c, b) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            document.querySelectorAll('.product-card').forEach(card => {
                card.style.display = (c === 'all' || card.dataset.cat === c) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
